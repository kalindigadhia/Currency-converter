<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>currency converter</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <h2>Currency Converter</h2>
        <form>
            <div class="amount">
            <p>Enter Amount</p>
            <input value="100" type="text"/>
            </div>
            <div class="dropdown">
                <div class="from"><!--this are the dropdowns for ex :- to convert dollers to INR -->
                    <p>From</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/TR/flat/64.png"/>
                        <select name="from">
                        
                        </select>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                <div class="to">
                    <p>To</p>
                    <div class="select-container">
                        <img src="https://flagsapi.com/IN/flat/64.png"/>
                        <select name="to">
                            
                        </select>
                    </div>
                </div>
            </div>
            <div class="msg"></div>
            <button>Get Exchange Rate</button>
        </form>
    </div>
</body>
<script src="code.js"></script> <!--here the order of the script matters if the coje.js is after script.js the the countrylist will be undefined.-->
<script src="script.js"></script>
</html>
